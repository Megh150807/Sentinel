<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA / SEO -->
  <meta name="description" content="Sentinel Command — Real-time UPI mule syndicate detection dashboard.">
  <meta name="theme-color" content="#0D1117">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sentinel Command</title>

  <style>
    /* ── Sentinel Boot Screen ── */
    html, body {
      margin: 0; padding: 0;
      background-color: #050505;
      height: 100%;
      font-family: 'Courier New', monospace;
    }

    #boot-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #050505;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #boot-screen .logo {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      background: linear-gradient(135deg, #00FF87 0%, #00B4D8 60%, #7B2FBE 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    #boot-screen .subtitle {
      color: #4A5568;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    #boot-screen .loader-bar {
      width: 240px;
      height: 2px;
      background: #1A1A2E;
      border-radius: 2px;
      overflow: hidden;
    }

    #boot-screen .loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00FF87, #00B4D8);
      animation: boot-fill 1.8s ease-in-out forwards;
    }

    @keyframes boot-fill {
      0%   { width: 0%; }
      100% { width: 100%; }
    }

    #flutter-target {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- Boot screen shown while Flutter engine initialises -->
  <div id="boot-screen">
    <div class="logo">SENTINEL</div>
    <div class="subtitle">UPI Threat Intercept Network — v1.0</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <!-- Flutter renders into this element -->
  <div id="flutter-target"></div>

  <script>
    window.addEventListener('load', function() {
      var target = document.querySelector('#flutter-target');

      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            hostElement: target,
          }).then(function(appRunner) {
            // Fade out boot screen before running the app
            var boot = document.getElementById('boot-screen');
            boot.style.opacity = '0';
            setTimeout(function() {
              boot.style.display = 'none';
            }, 500);
            return appRunner.runApp();
          });
        }
      });
    });
  </script>

  <!-- Flutter bootstrap (generated by flutter build web) -->
  <script src="flutter.js" defer></script>

</body>
</html>
